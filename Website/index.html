<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yel0w's Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="bg-grid"></div>

<header>
    <div class="h-left">
        <span class="h-symbol">∑</span>
        <div>
            <h1>Yel0w's Lab</h1>
            <span class="h-sub">experimental mathematics &amp; computation</span>
        </div>
    </div>
    <div class="h-right" id="hStats"></div>
</header>

<main>
    <div class="controls">
        <div class="ctrl-left">
            <div class="search-wrap">
                <span class="search-prefix">$</span>
                <input type="text" id="search" placeholder="grep experiments..." spellcheck="false">
            </div>
        </div>
        <div class="ctrl-right">
            <button class="filter-btn active" data-f="all">all</button>
            <button class="filter-btn" data-f="Finished">finished</button>
            <button class="filter-btn" data-f="InProgress">active</button>
            <button class="filter-btn" data-f="Planned">planned</button>
            <button class="filter-btn" data-f="Archived">archived</button>
            <button class="filter-btn" data-f="Abandoned">dead</button>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th data-sort="Name" class="s-n">experiment <span class="s-arrow"></span></th>
                    <th data-sort="Status" class="s-s">status <span class="s-arrow"></span></th>
                    <th data-sort="Language" class="s-l">language <span class="s-arrow"></span></th>
                    <th data-sort="Framework" class="s-f">framework <span class="s-arrow"></span></th>
                    <th data-sort="Tags" class="s-t">tags <span class="s-arrow"></span></th>
                    <th data-sort="LastModified" class="s-d">modified <span class="s-arrow"></span></th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div class="loader-wrap" id="loader">
        <div class="lds"></div>
        <span>loading...</span>
    </div>
</main>

<div class="modal" id="modal">
    <div class="m-backdrop" id="mBackdrop"></div>
    <div class="m-dialog">
        <div class="m-head">
            <span class="m-title" id="mTitle"></span>
            <button class="m-close" id="mClose">&times;</button>
        </div>
        <div class="m-body" id="mBody"></div>
    </div>
</div>

<script src="scrypt.js"></script>
</body>
</html>
